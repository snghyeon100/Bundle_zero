# ─── Dataset ──────────────────────────────────────────────────────────────────
dataset: pog_dense                  # pog | pog_dense | spotify | spotify_sparse
data_path: ./datasets

# ─── Evaluation ───────────────────────────────────────────────────────────────
num_cans: 10        # number of candidates including the answer
num_token: 5       # max input items per bundle (-1 = no limit)
toy_eval: 250     # -1 = full test set | N = first N samples
seed: 45           # seed for candidate items (A-J)
shuffle_seed: 41   # seed for input items shuffling
use_hard_negative: true  # If true, loads from hard_negative_samples_<dataset>.json

# ─── LLM ──────────────────────────────────────────────────────────────────────

model: gemini-3.1-flash-lite-preview
temperature: 0.0
use_multimodal: false  # If true, loads images and sends them to Gemini along with text

use_cooccurrence: false  # If true, appends train BI co-bundled shared/candidate bundle counts to candidate options
use_soft_cooccurrence: false  # If true, appends soft I->B' co-bundled counts to candidate options
soft_cooccurrence_source: bundle_smoothing_bi_lgcn  # item_smoothing_text | item_smoothing_bi_lgcn | bundle_smoothing_text | bundle_smoothing_bi_lgcn

use_item_bundle_affiliation_desc: false  # IB x BI. If true, appends co-bundled item descriptions to input/candidate items
item_bundle_affiliation_k: 3
item_bundle_affiliation_alpha: 0.5
item_bundle_affiliation_seed: 45
item_bundle_affiliation_exclude_query_items: false
item_bundle_affiliation_use_soft: true  # (IB + I-B') x BI. Adds soft I->B' bundles before retrieving co-bundled items
item_bundle_affiliation_soft_source: bundle_smoothing_bi_lgcn  # item_smoothing_text | item_smoothing_bi_lgcn | bundle_smoothing_text | bundle_smoothing_bi_lgcn
item_bundle_affiliation_soft_alpha: 1.0

use_item_user_copurchase_desc: false  # If true, appends UI^T UI co-purchased item descriptions to input/candidate items
item_user_copurchase_k: 3
item_user_copurchase_alpha: 0.5
item_user_copurchase_seed: 45
item_user_copurchase_exclude_query_items: false

use_bundle_graph_context: false  # BI x IB. If true, prepends train bundles retrieved by input-item overlap and IDF tie-break
bundle_graph_context_k: 1
bundle_graph_context_max_items: 5
bundle_graph_context_seed: 45
bundle_graph_context_use_soft: false  # BI x (IB + I-B'). Adds soft I->B' matches to the bundle-context retrieval pool/score
bundle_graph_context_soft_source: bundle_smoothing_bi_lgcn  # item_smoothing_text | item_smoothing_bi_lgcn | bundle_smoothing_text | bundle_smoothing_bi_lgcn
bundle_graph_context_soft_alpha: 1.0

use_category_completion_prior_desc: false  # If true, prepends train-derived top-k complementary category hints using representative train items
use_category_item_text_aug: false  # If true, appends same-category representative item examples to item text
category_item_aug_apply_to: both  # inputs | candidates | both
category_item_aug_rep_items_per_category: 2
input_category_co_occur: true  # If true, appends category co-occurrence examples
input_category_co_occur_apply_to: inputs  # inputs | candidates | both
input_category_co_occur_top_k: 3
input_category_co_occur_rep_items_per_category: 1
category_prior_top_k: 3
category_prior_rep_items_per_category: 3
category_prior_min_support: 3
category_prior_max_itemset_size: 6
category_prior_embedding_model: text-embedding-3-large
category_prior_embedding_dtype: float16
category_prior_category_dtype: float32
category_prior_item_embedding_cache_root: ./analysis/openai_embedding_cache
category_prior_category_embedding_cache_root: ./analysis/category_embedding_cache

use_icl_retrieval: false # If true, prepends one retrieved solved example from bi_train.txt
icl_retrieval_method: input_embedding
icl_embedding_model: text-embedding-3-large
icl_embedding_dtype: float16
icl_embedding_cache_root: ./analysis/openai_embedding_cache/text-embedding-3-large/all_items
icl_example_num_cans: 10
icl_example_num_token: 5
icl_example_seed: 45
icl_max_train_examples: -1
icl_exclude_query_candidate_items: true

use_user_context: false # If true, prepends a selected user's related item history
user_context_selection: max_input_overlap_random_user_text_topk_items
user_context_embedding_model: text-embedding-3-large
user_context_embedding_dtype: float16
user_context_embedding_cache_root: ./analysis/openai_embedding_cache/text-embedding-3-large/all_items
user_context_top_k: 5
user_context_seed: 45
user_context_min_input_overlap: 1
user_context_exclude_candidate_items: true

# ─── Execution Mode ───────────────────────────────────────────────────────────
mode: sync        # sync | batch
max_concurrent: 10  # async concurrent limit for sync mode
batch_display_name: bundle-zeroshot
poll_interval: 60

# ─── Output ───────────────────────────────────────────────────────────────────
output_dir: ./results

# ─── Compare Results ──────────────────────────────────────────────────────────
fileA: "results/pog/results_pog_20260416_142034.csv"
fileB: "results/pog/results_pog_HN_C10_T5_20260503_002458.csv"
compare_name: "pog_base_vs_with_image"

# ─── Meta Analysis ────────────────────────────────────────────────────────────
analysis_data: analysis\pog_base_vs_with_image_analysis_ready.csv
descA: "기본 지시어 (Base instruction with only text information)"
descB: "기본 지시어 + image (Base instruction with text and image information)"
