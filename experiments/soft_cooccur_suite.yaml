max_parallel: 4
tmp_config_dir: experiments/tmp_configs
log_dir: experiments/logs

experiments:
  - name: pog_base
    api_key_slot: 1
    overrides:
      dataset: pog
      use_cooccurrence: true
      use_soft_cooccurrence: false
      soft_cooccurrence_source: item_smoothing_text
      use_item_bundle_affiliation_desc: false
      use_item_user_copurchase_desc: false
      use_bundle_graph_context: false
      use_icl_retrieval: false
      use_user_context: false

  - name: pog_soft_item_smoothing_text
    api_key_slot: 2
    overrides:
      dataset: pog
      use_cooccurrence: true
      use_soft_cooccurrence: true
      soft_cooccurrence_source: item_smoothing_text
      use_item_bundle_affiliation_desc: false
      use_item_user_copurchase_desc: false
      use_bundle_graph_context: false
      use_icl_retrieval: false
      use_user_context: false

  - name: pog_dense_base
    api_key_slot: 3
    overrides:
      dataset: pog_dense
      use_cooccurrence: true
      use_soft_cooccurrence: false
      soft_cooccurrence_source: bundle_smoothing_bi_lgcn
      use_item_bundle_affiliation_desc: false
      use_item_user_copurchase_desc: false
      use_bundle_graph_context: false
      use_icl_retrieval: false
      use_user_context: false

  - name: pog_dense_soft_item_smoothing_text
    api_key_slot: 4
    overrides:
      dataset: pog_dense
      use_cooccurrence:  true
      use_soft_cooccurrence: true
      soft_cooccurrence_source: item_smoothing_text
      use_item_bundle_affiliation_desc: false
      use_item_user_copurchase_desc: false
      use_bundle_graph_context: false
      use_icl_retrieval: false
      use_user_context: false

